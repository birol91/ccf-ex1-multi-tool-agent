<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musteri Destek Ajani</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      margin: 0; background: #f4f5f7; color: #1c1e21;
      display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 680px; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 20px; background: #4f46e5; color: #fff; }
    header h1 { margin: 0; font-size: 18px; }
    header p { margin: 4px 0 0; font-size: 13px; opacity: .85; }
    #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
    .user { align-self: flex-end; background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .agent { align-self: flex-start; background: #fff; border: 1px solid #e2e4e8; border-bottom-left-radius: 4px; }
    .confirm { align-self: flex-start; background: #fff7ed; border: 1px solid #fdba74; border-bottom-left-radius: 4px; }
    .pending { align-self: flex-start; color: #888; font-style: italic; font-size: 14px; }
    form { display: flex; gap: 8px; padding: 14px; border-top: 1px solid #e2e4e8; background: #fff; }
    #input { flex: 1; padding: 11px 14px; border: 1px solid #ccc; border-radius: 22px; font-size: 15px; outline: none; }
    #input:focus { border-color: #4f46e5; }
    button { padding: 0 20px; border: none; border-radius: 22px; background: #4f46e5; color: #fff; font-size: 15px; cursor: pointer; }
    button:disabled { background: #aab; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Musteri Destek Ajani</h1>
      <p>Siparis durumu, iade ve daha fazlasi. Ornek: "Ben CUST-123. ORD-987 durumu nedir?"</p>
    </header>
    <div id="log">
      <div class="msg agent">Merhaba! Size nasil yardimci olabilirim? Siparis durumunuzu sorabilir veya iade talep edebilirsiniz.</div>
    </div>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="Mesajinizi yazin..." />
      <button id="send" type="submit">Gonder</button>
    </form>
  </div>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    let sessionId = null;

    function addMsg(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMsg(text, "user");
      input.value = "";
      send.disabled = true;
      const pending = addMsg("yaziyor...", "pending");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        const data = await res.json();
        sessionId = data.session_id;
        pending.remove();
        addMsg(data.reply, data.awaiting_confirmation ? "confirm" : "agent");
      } catch (err) {
        pending.remove();
        addMsg("Hata: " + err.message, "agent");
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
